dataset:
  file: data/price.csv
  output: data/daily_price.pkl
  horizon: 5
  required_columns: [date, code, open, high, low, close, volume]
  start_date: '2020-01-01'
  end_date: '2026-12-31'
  max_stocks: 800
  universe_start_date: '2020-07-01'
  universe_end_date: '2020-12-31'
  mining_start_date: '2020-01-01'
  mining_end_date: '2023-12-31'
  out_of_sample_start_date: '2024-01-01'
  out_of_sample_end_date: '2026-12-31'
  chunksize: 500000

operators:
  time_series_backend: auto
  time_series_device: auto
  time_series_chunk_size: 64
  time_series_dtype: float32

model:
  name: GFlowNet
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  max_sequence_length: 32

training:
  epochs: 8
  trajectories_per_epoch: 16
  learning_rate: 0.0002
  weight_decay: 0.0001
  reward_temperature: 1.0
  mixed_precision: true
  reward_workers: 4
  seed: 42

reward:
  top_quantile: 0.10
  horizon: 5
  risk_aversion: 1.0
  min_cross_section: 20
  min_coverage: 0.80
  coverage_penalty_power: 2.0
  subexpression_cache_enabled: true
  subexpression_cache_max_entries: 128
  subexpression_cache_max_mb: 512

alpha_eval:
  rolling_window: 40
  perturbation_std: 0.05
  dpp_k: 20
  dpp_max_rows: 300000
  verbose: true
  seed: 42

lightgbm:
  horizon: 5
  train_window_days: 1008
  min_train_days: 756
  refit_interval_days: 40
  num_leaves: 31
  learning_rate: 0.05
  n_estimators: 200
  seed: 42
  prediction_start_date: '2024-01-01'
  prediction_end_date: '2026-12-31'

backtest:
  initial_cash: 1000000
  benchmark: 000300.XSHG
  top_n: 30
  rebalance_days: 5
  slippage: 0.001

pipeline:
  pool_size: 20
